name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-server:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: resume_analyser_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/resume_analyser_test
        run: npx prisma generate

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/resume_analyser_test
        run: npx prisma migrate deploy

      - name: Run server tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/resume_analyser_test
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-chars-long
          CLIENT_URL: http://localhost:5173
          NODE_ENV: test
        run: npm test

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Type check client
        working-directory: client
        run: npm run tsc

      - name: Run client component tests
        working-directory: client
        run: npm test
